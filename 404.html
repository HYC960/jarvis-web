<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Project JARVIS</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background-color: #000;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    
    .lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    
    .line {
      width: 1px;
      height: 100%;
      background: rgba(255, 255, 255, 0.04);
      position: absolute;
      animation: moveLines 8s linear infinite;
    }
    
    .line:nth-child(even) {
      animation-duration: 12s;
    }
    
    @keyframes moveLines {
      0% {
        transform: translateY(100%);
      }
      100% {
        transform: translateY(-100%);
      }
    }
    
    .error-container {
      text-align: center;
      z-index: 1;
      opacity: 0;
      animation: fadeIn 1s ease-out forwards;
      animation-delay: 0.3s;
    }
    
    .error-code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 8rem;
      font-weight: 700;
      margin-bottom: 1rem;
      position: relative;
      display: inline-block;
    }
    
    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    
    .error-code::before {
      color: rgba(255, 255, 255, 0.3);
      animation: glitch-effect 3s infinite;
    }
    
    .error-code::after {
      color: rgba(255, 255, 255, 0.2);
      animation: glitch-effect 2s infinite reverse;
    }
    
    @keyframes glitch-effect {
      0% { transform: translate(0); }
      20% { transform: translate(-3px, 3px); }
      40% { transform: translate(-3px, -3px); }
      60% { transform: translate(3px, 3px); }
      80% { transform: translate(3px, -3px); }
      100% { transform: translate(0); }
    }
    
    .error-message {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: #ccc;
      max-width: 500px;
      line-height: 1.5;
    }
    
    .home-btn {
      padding: 0.8rem 2rem;
      background: transparent;
      color: #fff;
      border: 1px solid #fff;
      border-radius: 25px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    
    .home-btn:hover {
      background: #fff;
      color: #000;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    }
    
    .astronaut {
      position: absolute;
      bottom: -50px;
      right: -50px;
      font-size: 10rem;
      opacity: 0.1;
      animation: float 8s ease-in-out infinite;
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="lines">
    <div class="line" style="left: 10%;"></div>
    <div class="line" style="left: 30%;"></div>
    <div class="line" style="left: 50%;"></div>
    <div class="line" style="left: 70%;"></div>
    <div class="line" style="left: 85%;"></div>
  </div>
  
  <div class="error-container">
    <div class="error-code">404</div>
    <p class="error-message">
      Oops! The page you're looking for doesn't exist.<br>
      Maybe you're lost in space. 🪐
    </p>
    <a href="/index.html" class="home-btn">Back to Home</a>
  </div>
  
  <div class="astronaut">👨‍🚀</div>
</body>

</html>
